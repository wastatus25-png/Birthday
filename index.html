<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- Slide 1 -->
    <div class="slide active">
        <h1 class="typing">Shizuka 💖</h1>
        <button onclick="nextSlide()">Start</button>
    </div>

    <!-- Slide 2 -->
    <div class="slide">
        <h2 class="typing">You are special for me ❤️</h2>
        <button onclick="nextSlide()">Next</button>
    </div>

    <!-- Slide 3 -->
    <div class="slide">
        <h2 class="typing">Happy Birthday 🎂</h2>
        <button onclick="nextSlide()">Next</button>
    </div>

    <!-- Final Slide -->
    <div class="slide">
        <div class="final-box">
            <h2>💖 Happy Birthday Shizuka 💖</h2>
            <p>You are my favorite person ✨</p>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
